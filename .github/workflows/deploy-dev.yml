name: Deploy Development

on:
  workflow_run:
    workflows:
      - Validate
    types:
      - completed
    branches:
      - "release/**"

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload source to VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            mkdir -p /opt/customer-churn/dev &&
            find /opt/customer-churn/dev -mindepth 1 -maxdepth 1 \
              ! -name '.env.dev' ! -name 'venv' \
              -exec rm -rf {} +
          "
          tar \
            --exclude=.git \
            --exclude=venv \
            --exclude=__pycache__ \
            --exclude='*.pyc' \
            --exclude=mlruns \
            --exclude='data/raw' \
            --exclude='data/predictions.db' \
            -czf - . | ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "tar -xzf - -C /opt/customer-churn/dev"

      - name: Write dev environment file
        env:
          DEV_ENV_FILE: ${{ secrets.DEV_ENV_FILE }}
        if: ${{ env.DEV_ENV_FILE != '' }}
        run: |
          printf '%s\n' "$DEV_ENV_FILE" | \
            ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cat > /opt/customer-churn/dev/.env.dev"

      - name: Deploy to dev VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /opt/customer-churn/dev && \
             chmod +x deploy/deploy-dev.sh && \
             BRANCH_NAME='${{ github.event.workflow_run.head_branch }}' \
             DEPLOY_SHA='${{ github.event.workflow_run.head_sha }}' \
             APP_DIR='/opt/customer-churn/dev' \
             ./deploy/deploy-dev.sh"
